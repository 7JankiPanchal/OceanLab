<!DOCTYPE html>
<html>
<head>
<title>Leaderboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-green-50 p-6">

<h1 class="text-3xl font-bold text-green-600 mb-6">🏆 Leaderboard</h1>

<div id="leaderboard" class="space-y-4"></div>

<script>
function loadLeaderboard() {
    let history = JSON.parse(localStorage.getItem("history")) || [];

    let points = history.length * 10;

    const level =
        points > 200 ? "Eco Master 🌍" :
        points > 100 ? "Eco Warrior 🌿" :
        "Eco Beginner 🌱";

    document.getElementById("leaderboard").innerHTML = `
        <div class="bg-white p-6 rounded-xl shadow">
            <h2 class="text-xl font-bold">${level}</h2>
            <p>Total Points: ${points}</p>
            <p>Items Sorted: ${history.length}</p>
        </div>
    `;
}

window.onload = loadLeaderboard;
</script>

</body>
</html>
