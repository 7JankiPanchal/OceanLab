<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Custom Theme -->
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: "#13ec49"
      }
    }
  }
}
</script>

<!-- Material Icons -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<title>Activities</title>
</head>

<body class="bg-gray-100 p-6">

<h1 class="text-2xl font-black mb-4">📜 Your Activities</h1>

<!-- Controls -->
<div class="flex justify-between items-center mb-4 gap-2">
    <input id="searchBox" placeholder="Search activity..."
        class="w-full p-2 rounded-lg border text-sm focus:ring-2 focus:ring-primary outline-none" />

    <button onclick="clearActivities()"
        class="bg-red-500 text-white px-3 py-2 rounded-lg text-sm font-bold hover:scale-105 transition">
        Clear
    </button>
</div>

<!-- Activity List -->
<div id="activityList" class="space-y-3"></div>

<script>
// ===============================
// 🎯 ICON HELPER
// ===============================
function getActivityIcon(action) {
    action = action.toLowerCase();

    if (action.includes("plastic")) return "water_drop";
    if (action.includes("paper")) return "description";
    if (action.includes("glass")) return "wine_bar";
    if (action.includes("metal")) return "hardware";
    if (action.includes("waste")) return "recycling";

    return "eco";
}

// ===============================
// 🎨 COLOR HELPER
// ===============================
function getActivityColor(action) {
    action = action.toLowerCase();

    if (action.includes("plastic")) return "bg-blue-100 text-blue-600";
    if (action.includes("paper")) return "bg-yellow-100 text-yellow-600";
    if (action.includes("glass")) return "bg-purple-100 text-purple-600";
    if (action.includes("metal")) return "bg-gray-200 text-gray-700";
    if (action.includes("waste")) return "bg-green-100 text-green-600";

    return "bg-green-100 text-green-600";
}

// ===============================
// ⏱ TIME AGO FORMAT
// ===============================
function timeAgo(dateString) {
    const now = new Date();
    const past = new Date(dateString);
    const diff = Math.floor((now - past) / 1000);

    if (diff < 60) return "Just now";
    if (diff < 3600) return Math.floor(diff / 60) + " mins ago";
    if (diff < 86400) return Math.floor(diff / 3600) + " hrs ago";
    return Math.floor(diff / 86400) + " days ago";
}

// ===============================
// 📜 LOAD ACTIVITIES
// ===============================
function loadActivities(filter = "") {
    let activities = JSON.parse(localStorage.getItem("activities")) || [];

    const container = document.getElementById("activityList");
    container.innerHTML = "";

    // Sort latest first
    activities.reverse();

    // Filter
    activities = activities.filter(a =>
        a.action.toLowerCase().includes(filter.toLowerCase())
    );

    // Empty State
    if (activities.length === 0) {
        container.innerHTML = `
        <div class="text-center text-gray-400 py-10">
            <span class="material-symbols-outlined text-5xl">history</span>
            <p class="mt-2 text-sm">No activities yet</p>
        </div>`;
        return;
    }

    // Render
    activities.forEach(a => {
        const div = document.createElement("div");

        div.className = `
        flex items-center justify-between p-4 rounded-xl shadow-md
        bg-gradient-to-r from-white to-green-50 border
        hover:shadow-lg hover:scale-[1.02] transition
        `;

        div.innerHTML = `
        <div class="flex items-center gap-3">
            <div class="p-3 rounded-xl ${getActivityColor(a.action)}">
                <span class="material-symbols-outlined">
                    ${getActivityIcon(a.action)}
                </span>
            </div>

            <div>
                <p class="font-bold text-sm text-gray-800">${a.action}</p>
                <p class="text-xs text-gray-500">${timeAgo(a.time)}</p>
            </div>
        </div>

        <p class="text-green-600 font-extrabold text-lg">
            +${a.points} pts
        </p>
        `;

        container.appendChild(div);
    });
}

// ===============================
// 🔍 SEARCH (SAFE LOAD)
// ===============================
document.addEventListener("DOMContentLoaded", () => {

    loadActivities();

    document.getElementById("searchBox")
        .addEventListener("input", (e) => {
            loadActivities(e.target.value);
        });
});

// ===============================
// 🗑 CLEAR HISTORY
// ===============================
function clearActivities() {
    if (confirm("Clear all activities?")) {
        localStorage.removeItem("activities");
        loadActivities();
    }
}

// ===============================
// 🧪 DEMO DATA (OPTIONAL)
// ===============================
if (!localStorage.getItem("activities")) {
    localStorage.setItem("activities", JSON.stringify([
        { action: "Recycled plastic bottles", points: 60, time: new Date().toISOString() },
        { action: "Paper & cardboard batch", points: 120, time: new Date(Date.now() - 3600000).toISOString() },
        { action: "Metal waste sorted", points: 90, time: new Date(Date.now() - 7200000).toISOString() }
    ]));
}
</script>

</body>
</html>
